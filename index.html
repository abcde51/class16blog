<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七年级16班 · 班级博客</title>
    <style>
        :root {
            --primary: #4A6FA5;
            --primary-light: #6B8FC5;
            --primary-dark: #355280;
            --accent: #E85D75;
            --accent-light: #FF7D93;
            --green: #5B8C5A;
            --green-light: #7DAA7C;
            --bg: #F5F0EB;
            --card: #FFFFFF;
            --text: #3D3D3D;
            --text-light: #6B6B6B;
            --text-lighter: #999999;
            --border: #E8E3DD;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); }
        .navbar {
            background: #fff; border-bottom:1px solid var(--border);
            padding:0 24px; height:60px; display:flex; align-items:center;
            justify-content:space-between; position:sticky; top:0; z-index:100;
        }
        .brand { display:flex; align-items:center; gap:10px; font-weight:700; color: var(--primary-dark); cursor:pointer; }
        .logo-icon {
            width:38px; height:38px; border-radius:8px;
            background:linear-gradient(135deg, var(--primary-light), var(--primary));
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800;
        }
        .nav-actions { display:flex; gap:10px; align-items:center; }
        .btn {
            padding:8px 18px; border-radius:20px; font-weight:600; cursor:pointer;
            border:none; transition:0.2s; font-family:inherit; font-size:0.9rem;
        }
        .btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary); }
        .btn-outline:hover { background:var(--primary); color:#fff; }
        .btn-primary { background:var(--primary); color:#fff; border:2px solid var(--primary); }
        .btn-primary:hover { background:var(--primary-dark); }
        .btn-sm { padding:6px 14px; font-size:0.82rem; }
        .user-badge { display:flex; align-items:center; gap:8px; cursor:pointer; padding:6px 12px; border-radius:20px; }
        .avatar-circle {
            width:34px; height:34px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:700; font-size:0.85rem; flex-shrink:0;
        }
        .admin-badge { background:#FFD700; color:#5c3d00; border-radius:10px; padding:2px 8px; font-size:0.7rem; font-weight:700; margin-left:6px; }
        .pinned-tag {
            display:inline-block; background:#EBF5FF; border:1px solid #3B82F6;
            color:#1E40AF; border-radius:10px; padding:2px 10px; font-size:0.7rem; font-weight:700; margin-left:8px;
        }
        .main-container { max-width:800px; margin:0 auto; padding:24px 20px 40px; }
        .welcome-banner {
            background:linear-gradient(135deg, #667eea 0%, #4A6FA5 100%);
            color:#fff; border-radius:var(--radius-lg); padding:28px 32px; margin-bottom:28px;
        }
        .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .section-title { font-size:1.2rem; font-weight:700; }
        .btn-new-post {
            padding:10px 22px; border-radius:22px; font-weight:700; cursor:pointer;
            border:none; background:var(--green); color:#fff; display:flex; align-items:center; gap:6px;
        }
        .posts-list { display:flex; flex-direction:column; gap:16px; }
        .post-card {
            background:#fff; border-radius:var(--radius); padding:20px 24px;
            box-shadow:var(--shadow-sm); cursor:pointer; transition:0.2s; border:2px solid transparent;
        }
        .post-card.pinned { border-left:5px solid #3B82F6; background:#F8FAFE; }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .post-author-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; }
        .post-meta { font-size:0.8rem; color:var(--text-lighter); }
        .post-title { font-size:1.1rem; font-weight:700; margin:6px 0; }
        .post-excerpt { font-size:0.9rem; color:var(--text-light); }
        .post-stats { display:flex; gap:16px; margin-top:12px; font-size:0.82rem; color:var(--text-lighter); }
        .btn-like { background:#fff; border:2px solid #e8e3dd; padding:8px 16px; border-radius:20px; cursor:pointer; }
        .btn-like.liked { background:var(--accent); color:#fff; border-color:var(--accent); }
        .admin-actions { display:flex; gap:8px; margin-top:10px; }
        .btn-admin { padding:6px 12px; border-radius:14px; font-size:0.75rem; border:1px solid #ccc; background:#fff; cursor:pointer; }
        .comments-section { background:#fff; border-radius:var(--radius-lg); padding:24px; margin-top:20px; }
        .comment-form { display:flex; gap:10px; margin-bottom:20px; }
        .comment-form textarea { flex:1; border:2px solid var(--border); border-radius:8px; padding:10px; font-family:inherit; }
        .btn-submit-comment { padding:10px 18px; background:var(--primary); color:#fff; border:none; border-radius:20px; cursor:pointer; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:200; }
        .modal-dialog { background:#fff; border-radius:var(--radius-lg); padding:32px; width:90%; max-width:420px; }
        .modal-dialog h2 { margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-weight:600; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px; border:2px solid var(--border); border-radius:8px; }
        .btn-submit { width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:22px; font-weight:700; cursor:pointer; }
        .footer { text-align:center; padding:20px; color:var(--text-lighter); background:#fff; margin-top:auto; border-top:1px solid var(--border); }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 22px; border-radius:22px; z-index:999; }
        .toast.success { background:#5B8C5A; }
        .toast.error { background:#d44a62; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand" id="brandLink">
            <div class="logo-icon">16</div>
            <span>七年级16班</span>
        </div>
        <div class="nav-actions" id="navActions">
            <button class="btn btn-outline btn-sm" id="btnLoginNav" onclick="openModal('login')">登录</button>
            <button class="btn btn-primary btn-sm" id="btnRegisterNav" onclick="openModal('register')">注册</button>
            <div class="user-badge" id="userBadge" style="display:none;" onclick="toggleUserMenu()">
                <div class="avatar-circle" id="navAvatar"></div>
                <span id="navUsername"></span>
                <span>▾</span>
            </div>
        </div>
    </nav>

    <div class="main-container" id="mainContainer"></div>
    <div class="footer"><p>七年级16班 · 班级博客 © <span id="year"></span> ❤️ 记录我们的青春时光</p></div>
    <div id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ==================== Supabase 配置 ====================
        const SUPABASE_URL = 'https://oyavsdeskgnaybompqkn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Upmid5Gp5CDlxb_LRsvzNQ_R-89-w_1';
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentProfile = null;
        let currentView = 'list';
        let detailPostId = null;

        // ==================== 工具函数 ====================
        function getAvatarColor(str) {
            const colors = ['#4A6FA5','#5B8C5A','#E85D75','#F0A04B','#7B68EE','#20B2AA','#FF6B6B','#4ECDC4'];
            let hash = 0;
            for (let i = 0; i < (str||'').length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }
        function formatTime(ts) {
            const diff = Date.now() - new Date(ts).getTime();
            const mins = Math.floor(diff/60000);
            if (mins < 1) return '刚刚';
            if (mins < 60) return mins + '分钟前';
            const hrs = Math.floor(mins/60);
            if (hrs < 24) return hrs + '小时前';
            return new Date(ts).toLocaleDateString('zh-CN');
        }
        function showToast(msg, type='') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // ==================== 认证相关 ====================
        async function refreshProfile() {
            const { data: { user } } = await window.supabase.auth.getUser();
            if (!user) { currentProfile = null; return; }
            const { data: profile } = await window.supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();
            if (profile) {
                currentProfile = { id: user.id, email: user.email, ...profile };
            } else {
                // 自动创建缺失的 profiles 记录
                const newProf = {
                    id: user.id,
                    display_name: user.email.split('@')[0],
                    is_admin: false,
                    avatar_color: getAvatarColor(user.email),
                };
                await window.supabase.from('profiles').insert(newProf);
                currentProfile = newProf;
            }
            renderNavbar();
        }

        async function signUp(email, password, displayName) {
            const { data, error } = await window.supabase.auth.signUp({ email, password });
            if (error) throw error;
            const profile = {
                id: data.user.id,
                display_name: displayName,
                is_admin: false,
                avatar_color: getAvatarColor(email),
            };
            const { error: profileError } = await window.supabase.from('profiles').insert(profile);
            if (profileError) throw profileError;
            return data.user;
        }

        async function signIn(email, password) {
            const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            return data.user;
        }

        async function signOut() { await window.supabase.auth.signOut(); }

        // ==================== 数据获取 ====================
        async function fetchPosts() {
            const { data, error } = await window.supabase
                .from('posts')
                .select('*')
                .order('is_pinned', { ascending: false })
                .order('created_at', { ascending: false });
            if (error) throw error;
            return data;
        }

        async function fetchPost(postId) {
            const { data } = await window.supabase.from('posts').select('*').eq('id', postId).single();
            return data;
        }

        async function getLikeCount(postId) {
            const { count } = await window.supabase.from('likes').select('*', { count: 'exact' }).eq('post_id', postId);
            return count || 0;
        }

        async function isLikedByUser(postId) {
            if (!currentProfile) return false;
            const { count } = await window.supabase.from('likes').select('*', { count: 'exact' }).eq('post_id', postId).eq('user_id', currentProfile.id);
            return count > 0;
        }

        async function fetchComments(postId) {
            const { data } = await window.supabase.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
            return data;
        }

        // ==================== 渲染 ====================
        function renderNavbar() {
            document.getElementById('btnLoginNav').style.display = currentProfile ? 'none' : 'inline-block';
            document.getElementById('btnRegisterNav').style.display = currentProfile ? 'none' : 'inline-block';
            const badge = document.getElementById('userBadge');
            if (currentProfile) {
                badge.style.display = 'flex';
                document.getElementById('navAvatar').textContent = currentProfile.display_name.charAt(0);
                document.getElementById('navAvatar').style.backgroundColor = currentProfile.avatar_color;
                document.getElementById('navUsername').innerHTML = escapeHTML(currentProfile.display_name) + 
                    (currentProfile.is_admin ? '<span class="admin-badge">👑管理</span>' : '');
            } else {
                badge.style.display = 'none';
            }
        }

        async function renderPostList() {
            currentView = 'list';
            const container = document.getElementById('mainContainer');
            let posts = [];
            try { posts = await fetchPosts(); } catch (e) { container.innerHTML = '<p style="text-align:center;color:red;">加载失败，请检查网络</p>'; return; }
            let html = `
                <div class="welcome-banner">
                    <h1>七年级16班 · 班级博客</h1>
                    <p>分享“学习”点滴，记录魔丸时光</p>
                </div>
                <div class="toolbar">
                    <div class="section-title">最新帖子</div>
                    <button class="btn-new-post" onclick="openNewPostModal()">发布帖子</button>
                </div>
            `;
            if (posts.length === 0) html += '<p style="text-align:center;color:#999;">还没有帖子，快来发布第一篇吧！</p>';
            else {
                html += '<div class="posts-list">';
                posts.forEach(post => {
                    const pinned = post.is_pinned ? 'pinned' : '';
                    const pinnedTag = post.is_pinned ? '<span class="pinned-tag">📌 置顶</span>' : '';
                    const adminTag = post.author_is_admin ? '<span class="admin-badge">👑管理</span>' : '';
                    const excerpt = post.content.length > 100 ? post.content.substring(0,100).replace(/\n/g,' ')+'...' : post.content.replace(/\n/g,' ');
                    html += `
                        <div class="post-card ${pinned}" onclick="viewPost('${post.id}')">
                            <div class="post-header">
                                <div class="post-author-avatar" style="background-color:${post.author_avatar_color}">${escapeHTML(post.author_name.charAt(0))}</div>
                                <div>
                                    <span style="font-weight:700;">${escapeHTML(post.author_name)}${adminTag}${pinnedTag}</span>
                                    <div class="post-meta">${formatTime(post.created_at)}</div>
                                </div>
                            </div>
                            <div class="post-title">${escapeHTML(post.title)}</div>
                            <div class="post-excerpt">${escapeHTML(excerpt)}</div>
                            <div class="post-stats">
                                <span class="stat-heart">❤️ ${post.likes_count ?? 0}</span>
                                <span>💬 ${post.comments_count ?? 0} 回复</span>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }
            container.innerHTML = html;
            renderNavbar();
        }

        async function renderPostDetail(postId) {
            currentView = 'detail'; detailPostId = postId;
            const container = document.getElementById('mainContainer');
            const post = await fetchPost(postId);
            const comments = await fetchComments(postId);
            const likeCount = await getLikeCount(postId);
            const liked = await isLikedByUser(postId);

            let html = `
                <div style="margin-bottom:20px;">
                    <button style="background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;" onclick="goBack()">← 返回列表</button>
                </div>
                <div class="post-card" style="cursor:default;">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                        <div class="post-author-avatar" style="background-color:${post.author_avatar_color};">${escapeHTML(post.author_name.charAt(0))}</div>
                        <div>
                            <span style="font-weight:700;">${escapeHTML(post.author_name)}</span>
                            ${post.author_is_admin ? '<span class="admin-badge">👑管理</span>' : ''}
                            ${post.is_pinned ? '<span class="pinned-tag">📌 置顶</span>' : ''}
                            <div style="color:#999; font-size:0.8rem;">${formatTime(post.created_at)}</div>
                        </div>
                    </div>
                    <h2 style="margin-bottom:10px;">${escapeHTML(post.title)}</h2>
                    <div style="white-space:pre-wrap; padding:16px 0; border-top:1px solid #eee; border-bottom:1px solid #eee; margin-bottom:12px;">${escapeHTML(post.content)}</div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <button class="btn-like ${liked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            ${liked ? '❤️' : '🤍'} ${likeCount}
                        </button>
                        ${currentProfile?.is_admin ? `
                        <div class="admin-actions">
                            <button class="btn-admin" onclick="togglePin('${post.id}', ${post.is_pinned})">${post.is_pinned ? '取消置顶' : '📌 置顶'}</button>
                            <button class="btn-admin" onclick="deletePost('${post.id}')">🗑️ 删除</button>
                        </div>
                        ` : ''}
                    </div>
                </div>
                <div class="comments-section">
                    <h3>💬 回复 (${comments.length})</h3>
                    ${currentProfile ? `
                    <div class="comment-form">
                        <textarea id="commentInput" placeholder="写下你的回复..."></textarea>
                        <button class="btn-submit-comment" onclick="submitComment('${post.id}')">发送</button>
                    </div>
                    ` : '<p style="text-align:center;color:#999;">请先登录后再回复</p>'}
                    ${comments.length === 0 ? '<p style="text-align:center;color:#999;">暂无回复</p>' : comments.map(c => `
                        <div style="display:flex; gap:10px; padding:10px 0; border-bottom:1px solid #f0ece6;">
                            <div class="avatar-circle" style="width:32px;height:32px;font-size:0.75rem; background-color:${c.author_avatar_color};">${escapeHTML(c.author_name.charAt(0))}</div>
                            <div>
                                <span style="font-weight:700;">${escapeHTML(c.author_name)}</span>
                                ${c.author_is_admin ? '<span class="admin-badge">👑管理</span>' : ''}
                                <span style="color:#999; font-size:0.7rem; margin-left:8px;">${formatTime(c.created_at)}</span>
                                <div style="margin-top:4px;">${escapeHTML(c.content)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = html;
            renderNavbar();
            window.scrollTo(0,0);
        }

        // ==================== 交互操作 ====================
        async function toggleLike(postId) {
            if (!currentProfile) { showToast('请先登录','error'); openModal('login'); return; }
            const { data: exist } = await window.supabase.from('likes').select('*').eq('post_id', postId).eq('user_id', currentProfile.id).maybeSingle();
            if (exist) await window.supabase.from('likes').delete().eq('post_id', postId).eq('user_id', currentProfile.id);
            else await window.supabase.from('likes').insert({ post_id: postId, user_id: currentProfile.id });
            if (currentView === 'detail' && detailPostId === postId) renderPostDetail(postId);
            else renderPostList();
        }

        async function togglePin(postId, currentPinned) {
            if (!currentProfile?.is_admin) return;
            await window.supabase.from('posts').update({ is_pinned: !currentPinned }).eq('id', postId);
            showToast(currentPinned ? '已取消置顶' : '已置顶', 'success');
            if (currentView === 'detail' && detailPostId === postId) renderPostDetail(postId);
            else renderPostList();
        }

        async function deletePost(postId) {
            if (!currentProfile?.is_admin) return;
            if (!confirm('确定要删除这个帖子吗？')) return;
            const { error } = await window.supabase.from('posts').delete().eq('id', postId);
            if (error) { showToast('删除失败: '+error.message, 'error'); return; }
            showToast('帖子已删除', 'success');
            goBack();
        }

        async function submitComment(postId) {
            if (!currentProfile) return;
            const content = document.getElementById('commentInput').value.trim();
            if (!content) return;
            await window.supabase.from('comments').insert({
                post_id: postId, content,
                author_id: currentProfile.id,
                author_name: currentProfile.display_name,
                author_avatar_color: currentProfile.avatar_color,
            });
            renderPostDetail(postId);
            showToast('回复成功','success');
        }

        async function createPost(title, content) {
            if (!currentProfile) return;
            await window.supabase.from('posts').insert({
                title, content,
                author_id: currentProfile.id,
                author_name: currentProfile.display_name,
                author_avatar_color: currentProfile.avatar_color,
            });
            showToast('发布成功！','success');
            renderPostList();
        }

        // ==================== 模态框 ====================
        function openModal(type) {
            const isLogin = type === 'login';
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-dialog">
                        <h2>${isLogin ? '登录' : '注册新账号'}</h2>
                        <form id="authForm">
                            <div class="form-group">
                                <label>邮箱（可用任意邮箱）</label>
                                <input type="email" id="email" required>
                                <div class="error-msg" id="emailError"></div>
                            </div>
                            ${!isLogin ? `<div class="form-group">
                                <label>昵称</label>
                                <input type="text" id="displayName" required>
                                <div class="error-msg" id="displayNameError"></div>
                            </div>` : ''}
                            <div class="form-group">
                                <label>密码</label>
                                <input type="password" id="password" minlength="6" required>
                                <div class="error-msg" id="passwordError"></div>
                            </div>
                            <button type="submit" class="btn-submit">${isLogin ? '登录' : '注册'}</button>
                        </form>
                        <p style="text-align:center; margin-top:12px; font-size:0.9rem;">
                            ${isLogin ? '没有账号？<a href="#" onclick="openModal(\'register\')">注册</a>' : '已有账号？<a href="#" onclick="openModal(\'login\')">登录</a>'}
                        </p>
                    </div>
                </div>
            `;
            document.getElementById('authForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                try {
                    if (isLogin) await signIn(email, password);
                    else {
                        const displayName = document.getElementById('displayName').value.trim();
                        if (!displayName) return;
                        await signUp(email, password, displayName);
                    }
                    closeModal();
                    await refreshProfile();
                    renderPostList();
                    showToast(isLogin ? '登录成功' : '注册成功', 'success');
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });
        }
        function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
        function openNewPostModal() {
            if (!currentProfile) { openModal('login'); return; }
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-dialog">
                        <h2>发布新帖子</h2>
                        <form id="postForm">
                            <div class="form-group"><input type="text" id="postTitle" placeholder="标题" required></div>
                            <div class="form-group"><textarea id="postContent" rows="6" placeholder="内容" required></textarea></div>
                            <button type="submit" class="btn-submit">发布</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('postForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('postTitle').value.trim();
                const content = document.getElementById('postContent').value.trim();
                await createPost(title, content);
                closeModal();
            });
        }
        async function toggleUserMenu() {
            if (confirm('确定退出登录？')) { await signOut(); currentProfile = null; renderNavbar(); renderPostList(); }
        }
        function goBack() { currentView='list'; renderPostList(); }
        function viewPost(id) { renderPostDetail(id); }

        // 挂载全局函数
        window.viewPost = viewPost;
        window.goBack = goBack;
        window.toggleLike = toggleLike;
        window.togglePin = togglePin;
        window.deletePost = deletePost;
        window.submitComment = submitComment;
        window.openNewPostModal = openNewPostModal;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.toggleUserMenu = toggleUserMenu;

        // 初始化
        (async () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            document.getElementById('brandLink').addEventListener('click', ()=>{ renderPostList(); window.scrollTo(0,0); });
            await refreshProfile();
            renderPostList();
            window.supabase.auth.onAuthStateChange(async () => {
                await refreshProfile();
                if (currentView === 'list') renderPostList();
                else if (detailPostId) renderPostDetail(detailPostId);
            });
        })();
    </script>
</body>
</html>
