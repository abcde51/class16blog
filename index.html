<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七年级16班 · 班级博客</title>
    <style>
        :root {
            --primary: #4A6FA5;
            --primary-light: #6B8FC5;
            --primary-dark: #355280;
            --accent: #E85D75;
            --accent-light: #FF7D93;
            --green: #5B8C5A;
            --green-light: #7DAA7C;
            --bg: #F5F0EB;
            --card: #FFFFFF;
            --text: #3D3D3D;
            --text-light: #6B6B6B;
            --text-lighter: #999999;
            --border: #E8E3DD;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text); }

        /* 通用动效 */
        .btn, .post-card, .modal-dialog, .btn-new-post, .btn-like {
            transition: all var(--transition);
        }
        .btn:active, .btn-new-post:active, .btn-like:active {
            transform: scale(0.96);
        }
        @keyframes fadeSlideIn {
            from { opacity:0; transform: translateY(20px); }
            to { opacity:1; transform: translateY(0); }
        }
        .post-card { animation: fadeSlideIn 0.35s ease both; }
        .post-card:nth-child(1) { animation-delay: 0.05s; }
        .post-card:nth-child(2) { animation-delay: 0.1s; }
        .post-card:nth-child(3) { animation-delay: 0.15s; }
        .post-card:nth-child(4) { animation-delay: 0.2s; }
        .post-card:nth-child(5) { animation-delay: 0.25s; }

        .navbar {
            background: #fff; border-bottom:1px solid var(--border);
            padding:0 24px; height:60px; display:flex; align-items:center;
            justify-content:space-between; position:sticky; top:0; z-index:100;
        }
        .brand { display:flex; align-items:center; gap:10px; font-weight:700; color: var(--primary-dark); cursor:pointer; }
        .logo-icon {
            width:38px; height:38px; border-radius:8px;
            background:linear-gradient(135deg, var(--primary-light), var(--primary));
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:800;
        }
        .nav-actions { display:flex; gap:10px; align-items:center; position:relative; }
        .btn {
            padding:8px 18px; border-radius:20px; font-weight:600; cursor:pointer;
            border:none; font-family:inherit; font-size:0.9rem;
        }
        .btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary); }
        .btn-outline:hover { background:var(--primary); color:#fff; }
        .btn-primary { background:var(--primary); color:#fff; border:2px solid var(--primary); }
        .btn-primary:hover { background:var(--primary-dark); }
        .btn-sm { padding:6px 14px; font-size:0.82rem; }
        .user-badge {
            display:flex; align-items:center; gap:8px; cursor:pointer; padding:6px 12px; border-radius:20px;
            position:relative;
        }
        .user-badge:hover { background:#f0f2f5; }
        .avatar-circle {
            width:34px; height:34px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:700; font-size:0.85rem; flex-shrink:0;
        }
        .admin-badge { background:#FFD700; color:#5c3d00; border-radius:10px; padding:2px 8px; font-size:0.7rem; font-weight:700; margin-left:6px; }
        .pinned-tag {
            display:inline-block; background:#EBF5FF; border:1px solid #3B82F6;
            color:#1E40AF; border-radius:10px; padding:2px 10px; font-size:0.7rem; font-weight:700; margin-left:8px;
        }

        /* 下拉菜单 */
        .dropdown-menu {
            position: absolute; top: calc(100% + 6px); right: 0;
            background: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            min-width: 160px; z-index: 300; overflow: hidden;
            transform-origin: top right;
            animation: dropdownIn 0.2s ease;
        }
        @keyframes dropdownIn {
            from { opacity:0; transform: scale(0.9); }
            to { opacity:1; transform: scale(1); }
        }
        .dropdown-item {
            padding: 12px 20px; cursor:pointer; font-size:0.9rem; font-weight:500;
            display:flex; align-items:center; gap:8px; transition: background 0.15s;
        }
        .dropdown-item:hover { background: #f5f7fa; }
        .dropdown-item.danger { color: #d44a62; }

        .main-container { max-width:800px; margin:0 auto; padding:24px 20px 40px; }
        .welcome-banner {
            background:linear-gradient(135deg, #667eea 0%, #4A6FA5 100%);
            color:#fff; border-radius:var(--radius-lg); padding:28px 32px; margin-bottom:28px;
        }
        .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .section-title { font-size:1.2rem; font-weight:700; }
        .btn-new-post {
            padding:10px 22px; border-radius:22px; font-weight:700; cursor:pointer;
            border:none; background:var(--green); color:#fff; display:flex; align-items:center; gap:6px;
        }
        .btn-new-post:hover { background:var(--green-light); transform: translateY(-2px); }

        .posts-list { display:flex; flex-direction:column; gap:16px; }
        .post-card {
            background:#fff; border-radius:var(--radius); padding:20px 24px;
            box-shadow:var(--shadow-sm); cursor:pointer; transition: all 0.2s; border:2px solid transparent;
        }
        .post-card:hover { box-shadow:var(--shadow-md); transform: translateY(-3px); border-color:#d5d9e2; }
        .post-card.pinned { border-left:5px solid #3B82F6; background:#F8FAFE; }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .post-author-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; }
        .post-meta { font-size:0.8rem; color:var(--text-lighter); }
        .post-title { font-size:1.1rem; font-weight:700; margin:6px 0; }
        .post-excerpt { font-size:0.9rem; color:var(--text-light); }
        .post-stats { display:flex; gap:16px; margin-top:12px; font-size:0.82rem; color:var(--text-lighter); }
        .btn-like { background:#fff; border:2px solid #e8e3dd; padding:8px 16px; border-radius:20px; cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
        .btn-like.liked { background:var(--accent); color:#fff; border-color:var(--accent); }
        .btn-like:hover:not(.liked) { border-color:var(--accent); color:var(--accent); }
        .admin-actions { display:flex; gap:8px; margin-top:10px; }
        .btn-admin { padding:6px 12px; border-radius:14px; font-size:0.75rem; border:1px solid #ccc; background:#fff; cursor:pointer; transition:0.2s; }
        .btn-admin:hover { background:#f0f2f5; }

        .comments-section { background:#fff; border-radius:var(--radius-lg); padding:24px; margin-top:20px; }
        .comment-form { display:flex; gap:10px; margin-bottom:20px; }
        .comment-form textarea { flex:1; border:2px solid var(--border); border-radius:8px; padding:10px; font-family:inherit; resize:none; }
        .btn-submit-comment { padding:10px 18px; background:var(--primary); color:#fff; border:none; border-radius:20px; cursor:pointer; }
        .btn-submit-comment:hover { background:var(--primary-dark); }

        /* 模态框 */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(3px); }
        .modal-dialog { background:#fff; border-radius:var(--radius-lg); padding:32px; width:90%; max-width:440px; box-shadow:0 20px 50px rgba(0,0,0,0.2); animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
        .modal-dialog h2 { margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-weight:600; margin-bottom:4px; }
        .form-group input, .form-group textarea {
            width:100%; padding:10px 14px; border:2px solid var(--border); border-radius:8px; font-family:inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); }
        .btn-submit {
            width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:22px;
            font-weight:700; cursor:pointer; margin-top:8px;
        }
        .btn-submit:hover { background:var(--primary-dark); }
        .footer { text-align:center; padding:20px; color:var(--text-lighter); background:#fff; margin-top:auto; border-top:1px solid var(--border); }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 22px; border-radius:22px; z-index:999; }
        .toast.success { background:#5B8C5A; }
        .toast.error { background:#d44a62; }

        /* 修复发帖页错位 */
        textarea { display:block; }
        .modal-dialog textarea { min-height:120px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand" id="brandLink">
            <div class="logo-icon">16</div>
            <span>七年级16班</span>
        </div>
        <div class="nav-actions" id="navActions">
            <button class="btn btn-outline btn-sm" id="btnLoginNav" onclick="openModal('login')">登录</button>
            <button class="btn btn-primary btn-sm" id="btnRegisterNav" onclick="openModal('register')">注册</button>
            <div class="user-badge" id="userBadge" style="display:none;" onclick="toggleDropdown(event)">
                <div class="avatar-circle" id="navAvatar"></div>
                <span id="navUsername"></span>
                <span>▾</span>
                <div class="dropdown-menu" id="dropdownMenu" style="display:none;">
                    <div class="dropdown-item" onclick="openProfileModal()">✏️ 修改资料</div>
                    <div class="dropdown-item danger" onclick="logout()">🚪 退出登录</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-container" id="mainContainer"></div>
    <div class="footer"><p>七年级16班 · 班级博客 © <span id="year"></span> ❤️ 记录我们的老年养老时光</p></div>
    <div id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://oyavsdeskgnaybompqkn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Upmid5Gp5CDlxb_LRsvzNQ_R-89-w_1';
        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentProfile = null;
        let currentView = 'list';
        let detailPostId = null;

        // 工具函数
        function getAvatarColor(str) {
            const colors = ['#4A6FA5','#5B8C5A','#E85D75','#F0A04B','#7B68EE','#20B2AA','#FF6B6B','#4ECDC4'];
            let hash = 0;
            for (let i=0; i<(str||'').length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }
        function formatTime(ts) {
            const diff = Date.now() - new Date(ts).getTime();
            const mins = Math.floor(diff/60000);
            if (mins < 1) return '刚刚';
            if (mins < 60) return mins + '分钟前';
            const hrs = Math.floor(mins/60);
            if (hrs < 24) return hrs + '小时前';
            return new Date(ts).toLocaleDateString('zh-CN');
        }
        function showToast(msg, type='') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast '+type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
        function escapeHTML(s) {
            const div = document.createElement('div');
            div.textContent = s||'';
            return div.innerHTML;
        }

        // 认证
        async function refreshProfile() {
            const { data: { user } } = await window.supabase.auth.getUser();
            if (!user) { currentProfile = null; return; }
            const { data: profile } = await window.supabase.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                currentProfile = { id: user.id, email: user.email, ...profile };
            } else {
                const p = { id: user.id, display_name: user.email.split('@')[0], is_admin: false, avatar_color: getAvatarColor(user.email) };
                await window.supabase.from('profiles').insert(p);
                currentProfile = p;
            }
            renderNavbar();
        }
        async function signUp(email, password, displayName) {
            const { data, error } = await window.supabase.auth.signUp({ email, password });
            if (error) throw error;
            const prof = { id: data.user.id, display_name: displayName, is_admin: false, avatar_color: getAvatarColor(email) };
            await window.supabase.from('profiles').insert(prof);
            return data.user;
        }
        async function signIn(email, password) {
            const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            return data.user;
        }
        async function signOutUser() { await window.supabase.auth.signOut(); }

        // 数据获取
        async function fetchPosts() {
            const { data, error } = await window.supabase.from('posts').select('*')
                .order('is_pinned', { ascending: false })
                .order('created_at', { ascending: false });
            if (error) throw error;
            return data;
        }
        async function fetchPost(id) {
            const { data } = await window.supabase.from('posts').select('*').eq('id', id).single();
            return data;
        }
        async function getLikeCount(postId) {
            const { count } = await window.supabase.from('likes').select('*', { count: 'exact' }).eq('post_id', postId);
            return count || 0;
        }
        async function isLikedByUser(postId) {
            if (!currentProfile) return false;
            const { count } = await window.supabase.from('likes').select('*', { count: 'exact' }).eq('post_id', postId).eq('user_id', currentProfile.id);
            return count > 0;
        }
        async function fetchComments(postId) {
            const { data } = await window.supabase.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: true });
            return data;
        }

        // 渲染
        function renderNavbar() {
            document.getElementById('btnLoginNav').style.display = currentProfile ? 'none' : 'inline-block';
            document.getElementById('btnRegisterNav').style.display = currentProfile ? 'none' : 'inline-block';
            const badge = document.getElementById('userBadge');
            if (currentProfile) {
                badge.style.display = 'flex';
                document.getElementById('navAvatar').textContent = currentProfile.display_name.charAt(0);
                document.getElementById('navAvatar').style.backgroundColor = currentProfile.avatar_color;
                document.getElementById('navUsername').innerHTML = escapeHTML(currentProfile.display_name) +
                    (currentProfile.is_admin ? '<span class="admin-badge">👑管理</span>' : '');
            } else {
                badge.style.display = 'none';
            }
            // 关闭下拉菜单
            document.getElementById('dropdownMenu').style.display = 'none';
        }

        async function renderPostList() {
            currentView = 'list';
            const container = document.getElementById('mainContainer');
            let posts = [];
            try { posts = await fetchPosts(); } catch (e) {
                container.innerHTML = '<p style="text-align:center;color:red;">加载失败，请检查网络</p>';
                return;
            }
            let html = `<div class="welcome-banner"><h1>七年级16班 · 班级博客</h1><p>分享“学习”点滴，记录魔丸时光</p></div>`;
            html += `<div class="toolbar"><div class="section-title">最新帖子 (${posts.length})</div><button class="btn-new-post" onclick="openNewPostModal()">✏️ 发布帖子</button></div>`;
            if (posts.length === 0) html += '<p style="text-align:center;color:#999;">还没有帖子，快来发布第一篇吧！</p>';
            else {
                html += '<div class="posts-list">';
                posts.forEach(post => {
                    const pinned = post.is_pinned ? 'pinned' : '';
                    const pinnedTag = post.is_pinned ? '<span class="pinned-tag">📌 置顶</span>' : '';
                    const adminTag = post.author_is_admin ? '<span class="admin-badge">👑管理</span>' : '';
                    const excerpt = post.content.length > 100 ? post.content.substring(0,100).replace(/\n/g,' ')+'...' : post.content.replace(/\n/g,' ');
                    html += `
                        <div class="post-card ${pinned}" onclick="viewPost('${post.id}')">
                            <div class="post-header">
                                <div class="post-author-avatar" style="background-color:${post.author_avatar_color}">${escapeHTML(post.author_name.charAt(0))}</div>
                                <div>
                                    <span style="font-weight:700;">${escapeHTML(post.author_name)}${adminTag}${pinnedTag}</span>
                                    <div class="post-meta">${formatTime(post.created_at)}</div>
                                </div>
                            </div>
                            <div class="post-title">${escapeHTML(post.title)}</div>
                            <div class="post-excerpt">${escapeHTML(excerpt)}</div>
                            <div class="post-stats">
                                <span>❤️ ${post.likes_count ?? 0}</span>
                                <span>💬 ${post.comments_count ?? 0} 回复</span>
                            </div>
                        </div>`;
                });
                html += '</div>';
            }
            container.innerHTML = html;
            renderNavbar();
        }

        async function renderPostDetail(postId) {
            currentView = 'detail'; detailPostId = postId;
            const container = document.getElementById('mainContainer');
            const post = await fetchPost(postId);
            const comments = await fetchComments(postId);
            const likeCount = await getLikeCount(postId);
            const liked = await isLikedByUser(postId);
            let html = `<button style="background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;margin-bottom:16px;" onclick="goBack()">← 返回列表</button>`;
            html += `<div class="post-card" style="cursor:default;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><div class="post-author-avatar" style="background-color:${post.author_avatar_color};">${escapeHTML(post.author_name.charAt(0))}</div><div><span style="font-weight:700;">${escapeHTML(post.author_name)}</span>${post.author_is_admin?'<span class="admin-badge">👑管理</span>':''}${post.is_pinned?'<span class="pinned-tag">📌 置顶</span>':''}<div style="color:#999;font-size:0.8rem;">${formatTime(post.created_at)}</div></div></div>`;
            html += `<h2 style="margin-bottom:10px;">${escapeHTML(post.title)}</h2>`;
            html += `<div style="white-space:pre-wrap;padding:16px 0;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;margin-bottom:12px;">${escapeHTML(post.content)}</div>`;
            html += `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">`;
            html += `<button class="btn-like ${liked?'liked':''}" onclick="toggleLike('${post.id}')">${liked?'❤️':'🤍'} ${likeCount}</button>`;
            if (currentProfile?.is_admin) {
                html += `<div class="admin-actions"><button class="btn-admin" onclick="togglePin('${post.id}',${post.is_pinned})">${post.is_pinned?'取消置顶':'📌 置顶'}</button>`;
                html += `<button class="btn-admin" onclick="deletePost('${post.id}')">🗑️ 删除</button></div>`;
            }
            html += `</div></div>`;
            html += `<div class="comments-section"><h3>💬 回复 (${comments.length})</h3>`;
            if (currentProfile) {
                html += `<div class="comment-form"><textarea id="commentInput" placeholder="写下你的回复..."></textarea><button class="btn-submit-comment" onclick="submitComment('${post.id}')">发送</button></div>`;
            } else {
                html += '<p style="text-align:center;color:#999;">请先登录后再回复</p>';
            }
            comments.forEach(c => {
                html += `<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0f2f5;"><div class="avatar-circle" style="width:32px;height:32px;font-size:0.75rem;background-color:${c.author_avatar_color};">${escapeHTML(c.author_name.charAt(0))}</div><div><span style="font-weight:700;">${escapeHTML(c.author_name)}</span>${c.author_is_admin?'<span class="admin-badge">👑管理</span>':''}<span style="color:#999;font-size:0.7rem;margin-left:8px;">${formatTime(c.created_at)}</span><div>${escapeHTML(c.content)}</div></div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            renderNavbar();
            window.scrollTo(0,0);
        }

        // 交互
        async function toggleLike(postId) {
            if (!currentProfile) { showToast('请先登录','error'); openModal('login'); return; }
            const { data: exist } = await window.supabase.from('likes').select('*').eq('post_id', postId).eq('user_id', currentProfile.id).maybeSingle();
            if (exist) await window.supabase.from('likes').delete().eq('post_id', postId).eq('user_id', currentProfile.id);
            else await window.supabase.from('likes').insert({ post_id: postId, user_id: currentProfile.id });
            if (currentView === 'detail' && detailPostId === postId) renderPostDetail(postId);
            else renderPostList();
        }
        async function togglePin(postId, cur) {
            if (!currentProfile?.is_admin) return;
            await window.supabase.from('posts').update({ is_pinned: !cur }).eq('id', postId);
            showToast(cur?'已取消置顶':'已置顶','success');
            if (currentView==='detail' && detailPostId===postId) renderPostDetail(postId);
            else renderPostList();
        }
        async function deletePost(postId) {
            if (!currentProfile?.is_admin) return;
            if (!confirm('确定删除吗？')) return;
            const { error } = await window.supabase.from('posts').delete().eq('id', postId);
            if (error) { showToast('删除失败: '+error.message, 'error'); return; }
            showToast('已删除','success');
            goBack();
        }
        async function submitComment(postId) {
            if (!currentProfile) return;
            const content = document.getElementById('commentInput').value.trim();
            if (!content) return;
            await window.supabase.from('comments').insert({
                post_id: postId, content,
                author_id: currentProfile.id,
                author_name: currentProfile.display_name,
                author_avatar_color: currentProfile.avatar_color
            });
            renderPostDetail(postId);
            showToast('回复成功','success');
        }
        async function createPost(title, content) {
            await window.supabase.from('posts').insert({
                title, content,
                author_id: currentProfile.id,
                author_name: currentProfile.display_name,
                author_avatar_color: currentProfile.avatar_color
            });
            showToast('发布成功！','success');
            renderPostList();
        }

        // 模态框
        function openModal(type) {
            const isLogin = type === 'login';
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-dialog">
                        <h2>${isLogin?'登录':'注册新账号'}</h2>
                        <form id="authForm">
                            <div class="form-group"><label>邮箱（可用任意邮箱）</label><input type="email" id="email" required></div>
                            ${!isLogin?'<div class="form-group"><label>昵称</label><input type="text" id="displayName" required></div>':''}
                            <div class="form-group"><label>密码</label><input type="password" id="password" minlength="6" required></div>
                            <button type="submit" class="btn-submit">${isLogin?'登录':'注册'}</button>
                        </form>
                        <p style="text-align:center;margin-top:12px;">${isLogin?'没有账号？<a href="#" onclick="openModal(\'register\')">注册</a>':'已有账号？<a href="#" onclick="openModal(\'login\')">登录</a>'}</p>
                    </div>
                </div>`;
            document.getElementById('authForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                try {
                    if (isLogin) await signIn(email, password);
                    else {
                        const dn = document.getElementById('displayName').value.trim();
                        if (!dn) return;
                        await signUp(email, password, dn);
                    }
                    closeModal();
                    await refreshProfile();
                    renderPostList();
                    showToast(isLogin?'登录成功':'注册成功','success');
                } catch (err) { showToast(err.message, 'error'); }
            });
        }
        function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
        function openNewPostModal() {
            if (!currentProfile) { openModal('login'); return; }
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-dialog" style="max-width:500px;">
                        <h2>发布新帖子</h2>
                        <form id="postForm">
                            <div class="form-group"><input type="text" id="postTitle" placeholder="标题" required></div>
                            <div class="form-group"><textarea id="postContent" rows="6" placeholder="写点什么..." required></textarea></div>
                            <button type="submit" class="btn-submit">发布</button>
                        </form>
                    </div>
                </div>`;
            document.getElementById('postForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('postTitle').value.trim();
                const content = document.getElementById('postContent').value.trim();
                await createPost(title, content);
                closeModal();
            });
        }

        // 修改资料模态框
        function openProfileModal() {
            if (!currentProfile) return;
            document.getElementById('dropdownMenu').style.display = 'none';
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                    <div class="modal-dialog">
                        <h2>✏️ 修改资料</h2>
                        <form id="profileForm">
                            <div class="form-group"><label>新昵称</label><input type="text" id="newDisplayName" value="${escapeHTML(currentProfile.display_name)}" required></div>
                            <div class="form-group"><label>新密码（不填则不修改）</label><input type="password" id="newPassword" minlength="6" placeholder="留空保持不变"></div>
                            <button type="submit" class="btn-submit">保存</button>
                        </form>
                    </div>
                </div>`;
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newName = document.getElementById('newDisplayName').value.trim();
                const newPass = document.getElementById('newPassword').value;
                try {
                    // 更新昵称
                    if (newName !== currentProfile.display_name) {
                        const { error } = await window.supabase.from('profiles').update({ display_name: newName }).eq('id', currentProfile.id);
                        if (error) throw error;
                    }
                    // 更新密码
                    if (newPass) {
                        const { error } = await window.supabase.auth.updateUser({ password: newPass });
                        if (error) throw error;
                    }
                    closeModal();
                    await refreshProfile();
                    if (currentView === 'list') renderPostList();
                    else if (detailPostId) renderPostDetail(detailPostId);
                    showToast('资料已更新','success');
                } catch (err) {
                    showToast('修改失败: '+err.message, 'error');
                }
            });
        }

        // 下拉菜单
        function toggleDropdown(event) {
            event.stopPropagation();
            const menu = document.getElementById('dropdownMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
        async function logout() {
            await signOutUser();
            currentProfile = null;
            closeModal();
            document.getElementById('dropdownMenu').style.display = 'none';
            renderNavbar();
            renderPostList();
            showToast('已退出','success');
        }
        document.addEventListener('click', function(e) {
            const badge = document.getElementById('userBadge');
            if (!badge || !badge.contains(e.target)) {
                document.getElementById('dropdownMenu').style.display = 'none';
            }
        });

        function goBack() { currentView='list'; renderPostList(); }
        function viewPost(id) { renderPostDetail(id); }

        window.viewPost = viewPost;
        window.goBack = goBack;
        window.toggleLike = toggleLike;
        window.togglePin = togglePin;
        window.deletePost = deletePost;
        window.submitComment = submitComment;
        window.openNewPostModal = openNewPostModal;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.openProfileModal = openProfileModal;
        window.toggleDropdown = toggleDropdown;
        window.logout = logout;

        (async () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            document.getElementById('brandLink').addEventListener('click', ()=>{ renderPostList(); window.scrollTo(0,0); });
            await refreshProfile();
            renderPostList();
            window.supabase.auth.onAuthStateChange(async () => {
                await refreshProfile();
                if (currentView === 'list') renderPostList();
                else if (detailPostId) renderPostDetail(detailPostId);
            });
        })();
    </script>
</body>
</html>
